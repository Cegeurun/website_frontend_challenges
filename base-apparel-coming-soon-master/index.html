<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Base Apparel coming soon page</title>
  <link rel="stylesheet" href="./styles.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
</head>
<body>

  <header id="header">
    <img class="logo" src="./images/logo.svg" alt="Base Apparel Logo">
  </header>

  <div id="hero">
    <!-- <img src="./images/hero-mobile.jpg" alt="Hero Image"> -->
  </div>
  
  <div id="content">
    <p id="we-are">We're</p> <p id="coming-soon">coming soon</p>

    <br>
    <p class="description">
    Hello fellow shoppers! We're currently building our new fashion store. 
    Add your email below to stay up-to-date with announcements and our launch deals.
    </p>
    <br>
    <div id="email-form">
    <input type="email" id="email" name="email" placeholder="Email Address">
    <button id="submit-btn"><img src="./images/icon-arrow.svg" alt="Arrow Icon"></button>
    </div>
  
  </div>
  

  
  <footer>
    <!-- <p class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="#">Cegeurun</a>.
    </p> -->
  </footer>
</body>
</html>
